apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: '[]'
    capabilities: Basic Install
    createdAt: "2026-04-01T09:14:29Z"
    operators.operatorframework.io/builder: operator-sdk-v1.42.2
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
  name: portail-operator.v0.5.0
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions: {}
  description: |-
    Portail Operator watches Kubernetes Gateway API resources and automatically
    manages the lifecycle of Portail data plane Deployments and LoadBalancer Services.

    When a Gateway resource is created, the operator provisions a Portail Deployment
    and Service with ports derived from the Gateway listeners. When the Gateway is
    deleted, owned resources are garbage collected via owner references.

    The operator is fully decoupled from the Portail data plane — they communicate
    only through Kubernetes resources.

    ### Prerequisites
    - Gateway API CRDs (gateway.networking.k8s.io/v1)

    **OpenShift**: Gateway API standard channel CRDs are pre-installed. TCPRoute, UDPRoute,
    and TLSRoute require the experimental channel, which is managed by the Ingress Operator.

    **Kubernetes**: Install the experimental channel for full protocol support:
    `kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.5.1/experimental-install.yaml`

    A default GatewayClass named "portail" is created automatically on install.
  displayName: Portail
  icon:
    - base64data: ""
      mediatype: image/png
  install:
    spec:
      clusterPermissions:
        - rules:
            - apiGroups:
                - rbac.authorization.k8s.io
              resourceNames:
                - portail-operator-dataplane-role
              resources:
                - clusterroles
              verbs:
                - bind
            - apiGroups:
                - ""
              resources:
                - events
              verbs:
                - create
                - patch
            - apiGroups:
                - ""
              resources:
                - serviceaccounts
                - services
              verbs:
                - create
                - delete
                - get
                - list
                - patch
                - update
                - watch
            - apiGroups:
                - apps
              resources:
                - deployments
              verbs:
                - create
                - delete
                - get
                - list
                - patch
                - update
                - watch
            - apiGroups:
                - gateway.networking.k8s.io
              resources:
                - gatewayclasses
              verbs:
                - create
                - get
                - list
                - update
                - watch
            - apiGroups:
                - gateway.networking.k8s.io
              resources:
                - gatewayclasses/status
                - gateways/finalizers
              verbs:
                - update
            - apiGroups:
                - gateway.networking.k8s.io
              resources:
                - gateways
              verbs:
                - get
                - list
                - update
                - watch
            - apiGroups:
                - gateway.networking.k8s.io
              resources:
                - gateways/status
              verbs:
                - get
                - patch
                - update
            - apiGroups:
                - policy
              resources:
                - poddisruptionbudgets
              verbs:
                - create
                - delete
                - get
                - list
                - patch
                - update
                - watch
            - apiGroups:
                - rbac.authorization.k8s.io
              resources:
                - clusterrolebindings
              verbs:
                - create
                - delete
                - get
                - list
                - patch
                - update
                - watch
            - apiGroups:
                - authentication.k8s.io
              resources:
                - tokenreviews
              verbs:
                - create
            - apiGroups:
                - authorization.k8s.io
              resources:
                - subjectaccessreviews
              verbs:
                - create
          serviceAccountName: portail-operator-controller-manager
      deployments:
        - label:
            app.kubernetes.io/managed-by: kustomize
            app.kubernetes.io/name: portail-operator
            control-plane: controller-manager
          name: portail-operator-controller-manager
          spec:
            replicas: 1
            selector:
              matchLabels:
                app.kubernetes.io/name: portail-operator
                control-plane: controller-manager
            strategy: {}
            template:
              metadata:
                annotations:
                  kubectl.kubernetes.io/default-container: manager
                labels:
                  app.kubernetes.io/name: portail-operator
                  control-plane: controller-manager
              spec:
                containers:
                  - args:
                      - --metrics-bind-address=:8443
                      - --leader-elect
                      - --health-probe-bind-address=:8081
                      - --controller-name=portail.epheo.eu/gateway-controller
                      - --image=ghcr.io/epheo/portail:latest
                      - --default-replicas=2
                      - --service-account-name=portail-controller
                    command:
                      - /manager
                    image: quay.io/epheo/portail-operator:v0.5.0
                    imagePullPolicy: IfNotPresent
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 8081
                      initialDelaySeconds: 15
                      periodSeconds: 20
                    name: manager
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: 8081
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    resources:
                      limits:
                        cpu: 500m
                        memory: 128Mi
                      requests:
                        cpu: 10m
                        memory: 64Mi
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                      readOnlyRootFilesystem: true
                securityContext:
                  runAsNonRoot: true
                  seccompProfile:
                    type: RuntimeDefault
                serviceAccountName: portail-operator-controller-manager
                terminationGracePeriodSeconds: 10
      permissions:
        - rules:
            - apiGroups:
                - ""
              resources:
                - configmaps
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            - apiGroups:
                - coordination.k8s.io
              resources:
                - leases
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            - apiGroups:
                - ""
              resources:
                - events
              verbs:
                - create
                - patch
          serviceAccountName: portail-operator-controller-manager
    strategy: deployment
  installModes:
    - supported: true
      type: OwnNamespace
    - supported: true
      type: SingleNamespace
    - supported: false
      type: MultiNamespace
    - supported: true
      type: AllNamespaces
  keywords:
    - gateway-api
    - networking
    - load-balancer
    - proxy
    - ingress
  links:
    - name: Portail
      url: https://github.com/epheo/portail
    - name: Portail Operator
      url: https://github.com/epheo/portail-operator
  maintainers:
    - email: epheo@pm.me
      name: epheo
  maturity: alpha
  minKubeVersion: 1.28.0
  provider:
    name: epheo
    url: https://portail.epheo.eu
  version: 0.5.0
