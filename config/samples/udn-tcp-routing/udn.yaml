apiVersion: k8s.ovn.org/v1
kind: UserDefinedNetwork
metadata:
  name: udn-frontend
  namespace: default
spec:
  topology: Layer3
  layer3:
    role: Secondary
    subnets:
    - cidr: 10.200.0.0/16
---
apiVersion: k8s.ovn.org/v1
kind: UserDefinedNetwork
metadata:
  name: udn-backend
  namespace: default
spec:
  topology: Layer3
  layer3:
    role: Secondary
    subnets:
    - cidr: 10.201.0.0/16
