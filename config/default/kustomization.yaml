# Adds namespace to all resources.
namespace: portail-operator-system

# Prepended to the names of all resources, e.g. a Deployment named "controller-manager"
# becomes "portail-operator-controller-manager". Must share the prefix (text before '-')
# of the namespace field above.
namePrefix: portail-operator-

resources:
# CRDs are provided by Gateway API (gateway.networking.k8s.io); this operator
# defines none of its own, so there is no ../crd base.
- ../rbac
- ../manager
- metrics_service.yaml
# [PROMETHEUS] Uncomment to add a ServiceMonitor that scrapes the controller metrics.
#- ../prometheus
# [CONSOLE PLUGIN] Uncomment to deploy the OpenShift console topology plugin with the operator.
#- ../../console-plugin/deploy
# [NETWORK POLICY] Uncomment to restrict access to the /metrics endpoint with a NetworkPolicy.
#- ../network-policy

patches:
# Expose the controller-manager metrics endpoint over HTTPS on :8443.
# More info: https://book.kubebuilder.io/reference/metrics
- path: manager_metrics_patch.yaml
  target:
    kind: Deployment
