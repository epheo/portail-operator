apiVersion: apps/v1
kind: Deployment
metadata:
  name: portail-console-plugin
  namespace: portail-operator-system
  labels:
    app.kubernetes.io/name: portail-console-plugin
    app.kubernetes.io/part-of: portail-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: portail-console-plugin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portail-console-plugin
        app.kubernetes.io/part-of: portail-operator
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: console-plugin
          image: quay.io/epheo/portail-console-plugin:latest
          ports:
            - containerPort: 9443
              protocol: TCP
          volumeMounts:
            - name: serving-cert
              mountPath: /var/serving-cert
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 50Mi
            limits:
              memory: 100Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: serving-cert
          secret:
            secretName: portail-console-plugin-cert
