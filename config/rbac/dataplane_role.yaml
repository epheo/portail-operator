---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dataplane-role
rules:
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - gatewayclasses
  - gateways
  - httproutes
  - tcproutes
  - grpcroutes
  - tlsroutes
  - udproutes
  - referencegrants
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - gatewayclasses/status
  - gateways/status
  - httproutes/status
  - tcproutes/status
  - grpcroutes/status
  - tlsroutes/status
  - udproutes/status
  verbs:
  - get
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - namespaces
  - services
  - endpoints
  # Secrets are granted cluster-wide because the data plane uses a cluster-scoped
  # watch for TLS certificates, and the Gateway API spec supports cross-namespace
  # certificateRefs via ReferenceGrant. Scoping to per-namespace requires the data
  # plane to implement dynamic multi-namespace watches (tracked as future work).
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - k8s.cni.cncf.io
  resources:
  - network-attachment-definitions
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - discovery.k8s.io
  resources:
  - endpointslices
  verbs:
  - get
  - list
  - watch
