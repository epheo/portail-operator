---
# dataplane-role grants the portail data plane the cluster-wide read access it needs
# (Gateway API objects, route status, and the core/CNI resources it resolves backends
# from). Unlike the operator's own role (config/rbac/role.yaml, generated from
# +kubebuilder:rbac markers), this role is HAND-MAINTAINED — no marker generates it —
# so keep it in sync with the permissions portail actually requires. The operator binds
# it to per-namespace data-plane ServiceAccounts through the shared
# portail-operator-dataplane-binding ClusterRoleBinding (see internal/controller,
# GatewayReconciler.managedSubjects).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dataplane-role
rules:
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - gatewayclasses
  - gateways
  - httproutes
  - tcproutes
  - grpcroutes
  - tlsroutes
  - udproutes
  - referencegrants
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - gatewayclasses/status
  - gateways/status
  - httproutes/status
  - tcproutes/status
  - grpcroutes/status
  - tlsroutes/status
  - udproutes/status
  verbs:
  - get
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - namespaces
  - services
  # Secrets are granted cluster-wide because the data plane uses a cluster-scoped
  # watch for TLS certificates, and the Gateway API spec supports cross-namespace
  # certificateRefs via ReferenceGrant. Scoping to per-namespace requires the data
  # plane to implement dynamic multi-namespace watches (tracked as future work).
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - k8s.cni.cncf.io
  resources:
  - network-attachment-definitions
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - discovery.k8s.io
  resources:
  - endpointslices
  # get/list only (NO watch): a one-shot, label-filtered read so the data plane
  # can resolve a headless Service's NAMED targetPort to its numeric value.
  # Deliberately not a watch — backend pod churn is discovered via DNS
  # (STRICT_DNS), so no cluster-wide EndpointSlice informer is opened.
  verbs:
  - get
  - list
