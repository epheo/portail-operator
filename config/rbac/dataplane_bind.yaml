---
# This ClusterRole grants the operator permission to bind the dataplane ClusterRole
# without holding all the permissions in it (RBAC escalation bypass via "bind" verb).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dataplane-bind
rules:
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterroles
  verbs:
  - bind
  resourceNames:
  - portail-operator-dataplane-role
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dataplane-bind
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dataplane-bind
subjects:
- kind: ServiceAccount
  name: controller-manager
  namespace: system
