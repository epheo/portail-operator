name: Console Plugin Lint

on:
  push:
    branches: [main]
    paths: ['console-plugin/**']
  pull_request:
    paths: ['console-plugin/**']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: console-plugin/package-lock.json

      - name: Install dependencies
        run: cd console-plugin && npm ci

      - name: Lint
        run: cd console-plugin && npm run lint

      - name: Type check
        run: cd console-plugin && npm run typecheck

      - name: Build
        run: cd console-plugin && npm run build
