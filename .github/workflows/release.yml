name: Release

on:
  push:
    tags: ['v*']

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  test:
    uses: ./.github/workflows/test.yml

  test-e2e:
    uses: ./.github/workflows/test-e2e.yml

  release:
    needs: [lint, test, test-e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push operator image
        run: |
          make image-build image-push \
            IMG=ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }} \
            CONTAINER_TOOL=docker

      - name: Build and push bundle image
        run: |
          make bundle bundle-build bundle-push \
            IMG=ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }} \
            BUNDLE_IMG=ghcr.io/${{ github.repository }}-bundle:${{ steps.version.outputs.VERSION }} \
            VERSION=${{ steps.version.outputs.VERSION }} \
            CONTAINER_TOOL=docker

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build and push console plugin image
        run: |
          make console-plugin-image-build console-plugin-image-push \
            CONSOLE_PLUGIN_IMG=ghcr.io/${{ github.repository }}-console-plugin:${{ steps.version.outputs.VERSION }} \
            CONTAINER_TOOL=docker
